name: Build, Test, Publish, and Deploy

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ArbiScan.slnx

      - name: Build
        run: dotnet build ArbiScan.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ArbiScan.slnx --configuration Release --no-build

      - name: Derive image coordinates
        id: image
        shell: bash
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner_lc}/arbiscan" >> "$GITHUB_OUTPUT"

      - name: Read application version
        id: version
        shell: bash
        run: |
          chmod +x ./scripts/get-version.sh
          version="$(./scripts/get-version.sh)"
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.value }}
            type=sha,format=long,prefix=sha-

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-vps:
    needs: build-test-publish
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Check deploy configuration
        id: deploy-config
        shell: bash
        env:
          VPS_HOST: ${{ secrets.ARBISCAN_VPS_HOST }}
          VPS_USER: ${{ secrets.ARBISCAN_VPS_USER }}
          VPS_KEY: ${{ secrets.ARBISCAN_VPS_SSH_KEY }}
          VPS_APP_DIR: ${{ secrets.ARBISCAN_VPS_APP_DIR }}
        run: |
          if [[ -n "${VPS_HOST}" && -n "${VPS_USER}" && -n "${VPS_KEY}" && -n "${VPS_APP_DIR}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Auto-deploy skipped because one or more VPS secrets are missing." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Deploy latest image on VPS
        if: steps.deploy-config.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ARBISCAN_VPS_HOST }}
          username: ${{ secrets.ARBISCAN_VPS_USER }}
          key: ${{ secrets.ARBISCAN_VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.ARBISCAN_VPS_APP_DIR }}"
            existing_container_id="$(docker ps -aq -f name=^arbiscan$ || true)"
            if [[ -n "${existing_container_id}" ]]; then
              docker rm -f arbiscan || true
            fi
            docker compose pull
            docker compose up -d
            docker compose ps
